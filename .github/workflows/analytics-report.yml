name: Daily analytics report (Telegram)

# Pulls yesterday's Cloudflare Web Analytics and sends a summary to Telegram.
on:
  schedule:
    - cron: '13 9 * * *' # 09:13 UTC daily (yesterday's data is complete by then)
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Send analytics report to Telegram
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/analytics-report.mjs
