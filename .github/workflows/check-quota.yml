name: Check Places quota (diagnostic)

# TEMPORARY one-off: calls Place Details once with the real secret key and prints
# the raw response so we can read quota_limit_value (100 vs 125000). Delete after.
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Place Details quota
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          node -e "
          const key = process.env.GOOGLE_MAPS_API_KEY;
          fetch('https://places.googleapis.com/v1/places/ChIJ_URupwdmXj4R1RBkLIfrkMA', {
            headers: { 'X-Goog-Api-Key': key, 'X-Goog-FieldMask': 'id,displayName' }
          }).then(async r => {
            console.log('HTTP_STATUS=' + r.status);
            const t = await r.text();
            console.log('BODY_START');
            console.log(t);
            console.log('BODY_END');
          }).catch(e => { console.log('FETCH_ERROR', e.message); process.exit(1); });
          "
