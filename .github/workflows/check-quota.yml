name: Check Places quota (diagnostic)

# TEMPORARY: prints the full raw Place Details response (200 body OR 429 error
# with project_number + quota_limit_value) so we can tell data-plane lag from a
# wrong-project key. Delete after.
on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Place Details
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          node -e "
          const key = process.env.GOOGLE_MAPS_API_KEY;
          fetch('https://places.googleapis.com/v1/places/ChIJ_URupwdmXj4R1RBkLIfrkMA', {
            headers: { 'X-Goog-Api-Key': key, 'X-Goog-FieldMask': 'id,displayName' }
          }).then(async r => {
            console.log('HTTP_STATUS=' + r.status);
            const t = await r.text();
            console.log('=====BODY=====');
            console.log(t);
            console.log('=====END=====');
          }).catch(e => { console.log('FETCH_ERROR', e.message); });
          "
