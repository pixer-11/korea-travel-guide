name: Refresh existing posts (freshness)

# Weekly: re-check every post's venue against Google Places, update
# ratings/hours, and auto-unpublish anything that has closed.
on:
  schedule:
    - cron: '0 21 * * 0' # Sundays 21:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Refresh data
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: npm run refresh

      - name: Commit updates
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/posts
          if git diff --staged --quiet; then
            echo "Nothing to refresh."
          else
            git commit -m "content: refresh venue data ($(date -u +%Y-%m-%d))"
            git push
          fi
