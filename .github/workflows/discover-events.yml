name: Discover current events (web search)

# Weekly: web-search each active country for big upcoming events (concerts,
# sports, festivals, exhibitions) and publish timely guides for new ones.
on:
  schedule:
    - cron: '37 20 * * 3' # Wednesdays 20:37 UTC (off the hour)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Discover & write events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          EVENTS_PER_COUNTRY: '2'
        run: node scripts/discover-events.mjs

      - name: Build hero photo-wall thumbnails
        run: node scripts/build-wall.mjs

      - name: Commit new events
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/posts data/published.json public/wall data/wall.json
          if git diff --staged --quiet; then
            echo "No new events this run."
            exit 0
          fi
          git commit -m "content: discovered current events ($(date -u +%Y-%m-%d))"
          # This long-running job races with the daily-publish / venue-photo jobs and
          # manual pushes, so main often moves before we push. Rebase onto the latest
          # main (keeping our freshly generated files on the wholesale-regenerated JSON
          # via -X theirs) and retry with backoff.
          pushed=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase -X theirs origin/main; then
              if git push origin HEAD:main; then pushed=1; break; fi
            else
              git rebase --abort || true
            fi
            echo "Push attempt $attempt failed; syncing and retrying…"
            sleep $((attempt * 5))
          done
          if [ "$pushed" != 1 ]; then echo "Could not push after retries"; exit 1; fi
