name: Backfill countries to target

# One-time-ish bulk fill: every day it publishes as many guides as the Google
# Places daily quota allows (stops cleanly on 429), spread across all active
# countries, until each reaches TARGET_PER_COUNTRY guides. Once every country is
# full the queue is empty and this run publishes nothing — so it's safe to leave
# scheduled forever. New countries added later get filled the same way.
#
# Runs shortly after the Places quota resets (~08:00 UTC = Pacific midnight) so
# it gets a fresh daily allowance. The normal 8/day publish.yml runs at 22:00 UTC.
on:
  # PAUSED 2026-07-23: new-post generation suspended so the whole daily Places
  # quota goes to venue-photos.yml, which is replacing REAL Google photos on 162
  # food/trendy/hidden-gem posts that currently show mismatched Commons images
  # (a restaurant showing an ambulance, etc.). Re-enable this cron once venue
  # photos are backfilled. Manual runs still work via workflow_dispatch.
  # schedule:
  #   - cron: '43 8 * * *' # 08:43 UTC daily (off the hour), just after Places quota reset
  workflow_dispatch:
    inputs:
      count:
        description: 'Max posts this run (stops early on Places quota)'
        required: false
        default: '75' # keep in sync with the scheduled cap so a manual run doesn't starve publish
      target:
        description: 'Guides per country to fill toward'
        required: false
        default: '58'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate posts (capped per country)
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          # Cap below the Places 100/day quota so the NEXT daily auto-publish (16
          # posts, same quota cycle) still has budget: 75 backfill + 16 publish =
          # 91 posts. NOTE this counts TEXT SEARCH; each published post ALSO fires
          # 1 Details (like-a-local) + up to ~4 Photo calls, and venue-photos.yml
          # (capped 25) shares the same Places day. If the run logs "Details 429"
          # or publish yields ~0, lower this further. Was 90 → starved publish to ~2.
          POSTS_PER_RUN: ${{ github.event.inputs.count || '75' }}
          TARGET_PER_COUNTRY: ${{ github.event.inputs.target || '58' }}
          MIN_RATING: '4.0'
          MIN_REVIEWS: '50'
        run: npm run generate

      # Translate the batch into ko/ja/es/zh before committing so every backfilled
      # post ships with its translations. Resumable + continue-on-error (see
      # publish.yml). A big backfill = many translations; concurrency 8 keeps it
      # within the job timeout, and anything skipped this run is caught next run.
      - name: Translate new posts (ko/ja/es/zh)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSLATE_CONCURRENCY: '8'
        run: node scripts/translate-posts.mjs

      - name: Build hero photo-wall thumbnails
        run: node scripts/build-wall.mjs

      - name: Commit new posts
        id: commit
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/posts src/content/i18n data/published.json public/wall data/wall.json
          newfiles=$(git diff --cached --name-only --diff-filter=A -- src/content/posts | grep '\.md$' || true)
          new=$(printf '%s\n' "$newfiles" | grep -c . || true)
          total=$(ls src/content/posts/*.md | wc -l | tr -d ' ')
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          # Title + URL list of this run's new posts (shared formatter, capped for
          # Telegram), passed to notify-telegram.sh via NEW_LIST.
          list=$(printf '%s\n' "$newfiles" | node scripts/format-post-list.mjs || true)
          { echo "new_list<<TGEOF"; echo "$list"; echo "TGEOF"; } >> "$GITHUB_OUTPUT"
          if git diff --staged --quiet; then
            echo "No new posts this run — countries already at target."
          else
            git commit -m "content: backfill posts ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main
            git push
          fi

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          NEW: ${{ steps.commit.outputs.new }}
          TOTAL: ${{ steps.commit.outputs.total }}
          NEW_LIST: ${{ steps.commit.outputs.new_list }}
        run: bash scripts/notify-telegram.sh "Backfill"
