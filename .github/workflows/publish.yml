name: Auto-generate & publish posts

# Runs unattended on a schedule. Generates new posts, commits them,
# and the deploy (Cloudflare Pages / Vercel) picks up the push.
on:
  schedule:
    - cron: '19 21 * * *' # 21:19 UTC daily (off the hour — GitHub drops :00 crons)
  workflow_dispatch: # lets you run it manually from the Actions tab
    inputs:
      count:
        description: 'How many posts to generate this run (daily auto uses 16)'
        required: false
        default: '50'
      country:
        description: 'Optional: fill ONE country only, e.g. Japan (blank = all active)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate posts
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POSTS_PER_RUN: ${{ github.event.inputs.count || '16' }}
          COUNTRY: ${{ github.event.inputs.country }}
          MIN_RATING: '4.0'
          MIN_REVIEWS: '50'
        run: npm run generate

      # Translate the newly-generated posts into ko/ja/es/zh BEFORE committing, so
      # every post ships with its translations in the same push (no English-only
      # window). Resumable: only untranslated posts are done. continue-on-error so
      # an API hiccup still ships the English + whatever translated — the rest are
      # picked up on the next run (the script skips what already exists).
      - name: Translate new posts (ko/ja/es/zh)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSLATE_CONCURRENCY: '8'
        run: node scripts/translate-posts.mjs

      - name: Build hero photo-wall thumbnails
        run: node scripts/build-wall.mjs

      - name: Commit new posts
        id: commit
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/posts src/content/i18n data/published.json public/wall data/wall.json
          new=$(git diff --cached --name-only --diff-filter=A -- src/content/posts | grep -c '\.md$' || true)
          total=$(ls src/content/posts/*.md | wc -l | tr -d ' ')
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          # Title + URL list of the newly-added posts, for the Telegram report.
          list=$(git diff --cached --name-only --diff-filter=A -- src/content/posts | grep '\.md$' | node scripts/format-post-list.mjs || true)
          {
            echo "list<<POSTS_EOF"
            echo "$list"
            echo "POSTS_EOF"
          } >> "$GITHUB_OUTPUT"
          if git diff --staged --quiet; then
            echo "No new posts this run."
          else
            git commit -m "content: auto-generated posts ($(date -u +%Y-%m-%d))"
            # Rebase on any commits pushed while this run was working, so a
            # concurrent push can't reject ours with a non-fast-forward.
            git pull --rebase origin main
            git push
          fi

      - name: Validate content integrity
        id: validate
        continue-on-error: true
        run: node scripts/validate-content.mjs

      - name: Warn on content issues
        if: steps.validate.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          # `set -e -o pipefail` (GitHub default) would abort this step at the
          # failing command-substitution (validate exits 1 — the very case we warn
          # on), so the curl below never fires and the job goes red. `|| true`.
          MSG=$(node scripts/validate-content.mjs 2>&1 | head -25 || true)
          TXT=$(printf '⚠️ 콘텐츠 검증 경고 (일일 자동발행)\n%s' "$MSG")
          curl -s "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            --data-urlencode chat_id="$TELEGRAM_CHAT_ID" \
            --data-urlencode "text=$TXT" >/dev/null || true

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          NEW: ${{ steps.commit.outputs.new }}
          TOTAL: ${{ steps.commit.outputs.total }}
          NEW_LIST: ${{ steps.commit.outputs.list }}
        run: bash scripts/notify-telegram.sh "Daily publish"
