name: Auto-generate & publish posts

# Runs unattended on a schedule. Generates new posts, commits them,
# and the deploy (Cloudflare Pages / Vercel) picks up the push.
on:
  schedule:
    - cron: '0 22 * * *' # 22:00 UTC daily = 07:00 KST
  workflow_dispatch: # lets you run it manually from the Actions tab
    inputs:
      count:
        description: 'How many posts to generate this run (daily auto uses 2)'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate posts
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POSTS_PER_RUN: ${{ github.event.inputs.count || '8' }}
          MIN_RATING: '4.0'
          MIN_REVIEWS: '50'
        run: npm run generate

      - name: Build hero photo-wall thumbnails
        run: node scripts/build-wall.mjs

      - name: Commit new posts
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/posts data/published.json public/wall data/wall.json
          if git diff --staged --quiet; then
            echo "No new posts this run."
          else
            git commit -m "content: auto-generated posts ($(date -u +%Y-%m-%d))"
            # Rebase on any commits pushed while this run was working, so a
            # concurrent push can't reject ours with a non-fast-forward.
            git pull --rebase origin main
            git push
          fi
