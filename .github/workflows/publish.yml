name: Auto-generate & publish posts

# Runs unattended on a schedule. Generates new posts, commits them,
# and the deploy (Cloudflare Pages / Vercel) picks up the push.
on:
  schedule:
    - cron: '19 21 * * *' # 21:19 UTC daily (off the hour — GitHub drops :00 crons)
  workflow_dispatch: # lets you run it manually from the Actions tab
    inputs:
      count:
        description: 'How many posts to generate this run (daily auto uses 8)'
        required: false
        default: '50'
      country:
        description: 'Optional: fill ONE country only, e.g. Japan (blank = all active)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate posts
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          POSTS_PER_RUN: ${{ github.event.inputs.count || '8' }}
          COUNTRY: ${{ github.event.inputs.country }}
          MIN_RATING: '4.0'
          MIN_REVIEWS: '50'
        run: npm run generate

      - name: Build hero photo-wall thumbnails
        run: node scripts/build-wall.mjs

      - name: Commit new posts
        id: commit
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/posts data/published.json public/wall data/wall.json
          new=$(git diff --cached --name-only --diff-filter=A -- src/content/posts | grep -c '\.md$' || true)
          total=$(ls src/content/posts/*.md | wc -l | tr -d ' ')
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          if git diff --staged --quiet; then
            echo "No new posts this run."
          else
            git commit -m "content: auto-generated posts ($(date -u +%Y-%m-%d))"
            # Rebase on any commits pushed while this run was working, so a
            # concurrent push can't reject ours with a non-fast-forward.
            git pull --rebase origin main
            git push
          fi

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          NEW: ${{ steps.commit.outputs.new }}
          TOTAL: ${{ steps.commit.outputs.total }}
        run: bash scripts/notify-telegram.sh "Daily publish"
